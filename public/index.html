<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Deployment Status</title>
    <style>
        :root {
            --bg: #e0e5ec;
            --shadow: #a3b1c6;
            --highlight: #ffffff;
        }
        body {
            background-color: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        .card {
            width: 320px;
            padding: 40px;
            border-radius: 50px;
            background: var(--bg);
            box-shadow: 20px 20px 60px var(--shadow), -20px -20px 60px var(--highlight);
            text-align: center;
        }
        h1 { color: #4a4a4a; font-size: 1.5rem; }
        .status-pill {
            display: inline-block;
            padding: 10px 20px;
            margin-top: 20px;
            border-radius: 20px;
            background: var(--bg);
            box-shadow: inset 6px 6px 12px var(--shadow), inset -6px -6px 12px var(--highlight);
            color: #2ecc71;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Application Deployed Successfully</h1>
        <div class="status-pill">System Online</div>
    </div>
</body>
</html>
